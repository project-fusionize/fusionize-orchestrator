group = 'dev.fusionize'
version = '0.0.1-SNAPSHOT'
description = 'fusionize-orchestrator'

repositories {
    mavenCentral()
}

buildscript {
    ext{
        springBootVersion  = '3.5.6'
        springBootDependencyMangementVersion  = '1.1.7'
        springAiVersion = '1.1.2'
    }
}

allprojects {
    buildDir = "${rootProject.projectDir}/build${project.path.replace(':', '/')}"
}
subprojects {
    apply plugin: 'java'
    apply plugin: 'jacoco'
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }
    dependencies {
        testImplementation platform('org.junit:junit-bom:6.0.2')
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }
    repositories {
        mavenCentral()
    }
    tasks.named('test') {
        useJUnitPlatform()
        testLogging {
            showStandardStreams = true
        }
        jvmArgs '-XX:+EnableDynamicAgentLoading'
        finalizedBy jacocoTestReport
    }
    def jacocoExcludes = [
        '**/config/*Config*',
        '**/config/*Security*',
        '**/WorkerAutoConfiguration*',
        '**/WorkerMongoAutoConfiguration*',
        '**/WorkerAmqpAutoConfiguration*',
        '**/RuntimeComponentBeanRegistrar*',
        '**/vector/MongoVectorStorageService*',
        '**/vector/PineconeVectorStorageService*',
        '**/file/FileStorageServiceS3*',
    ]
    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
        }
        afterEvaluate {
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, excludes: jacocoExcludes)
            }))
        }
        doLast {
            def report = reports.xml.outputLocation.asFile.get()
            if (report.exists()) {
                def parser = new XmlSlurper()
                parser.setFeature("http://apache.org/xml/features/disallow-doctype-decl", false)
                parser.setFeature("http://apache.org/xml/features/nonvalidating/load-external-dtd", false)
                def xml = parser.parse(report)
                def counters = xml.counter
                def line = counters.find { it.@type == 'LINE' }
                def branch = counters.find { it.@type == 'BRANCH' }
                def instr = counters.find { it.@type == 'INSTRUCTION' }
                if (line) {
                    def missed = line.@missed.toInteger()
                    def covered = line.@covered.toInteger()
                    def total = missed + covered
                    def pct = total > 0 ? (covered * 100.0 / total).round(2) : 0
                    logger.lifecycle(">> ${project.name} LINE coverage: ${pct}% (${covered}/${total})")
                }
                if (branch) {
                    def missed = branch.@missed.toInteger()
                    def covered = branch.@covered.toInteger()
                    def total = missed + covered
                    def pct = total > 0 ? (covered * 100.0 / total).round(2) : 0
                    logger.lifecycle(">> ${project.name} BRANCH coverage: ${pct}% (${covered}/${total})")
                }
                if (instr) {
                    def missed = instr.@missed.toInteger()
                    def covered = instr.@covered.toInteger()
                    def total = missed + covered
                    def pct = total > 0 ? (covered * 100.0 / total).round(2) : 0
                    logger.lifecycle(">> ${project.name} INSTRUCTION coverage: ${pct}% (${covered}/${total})")
                }
            }
        }
    }
    jacocoTestCoverageVerification {
        dependsOn jacocoTestReport
        afterEvaluate {
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, excludes: jacocoExcludes)
            }))
        }
        violationRules {
            rule {
                limit {
                    minimum = 0.80
                }
            }
        }
    }
    tasks.named('check') {
        dependsOn jacocoTestCoverageVerification
    }
}

tasks.register('dev') {
    group = 'fusionize'
    description = 'Run Fusionize locally'

    dependsOn ':fusionize:apps:orchestrator:bootRun'
}